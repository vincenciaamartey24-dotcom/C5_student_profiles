    <header>

    <!-- The Grid Container where cards are displayed -->

        <div class="card" onclick="showMessage('Hi! I am Elpe. I love building web apps and working out!')">
            <img src="images/Elpe.png" alt="Elpe's Avatar" class="profile-img">
            <h3>Elpedia J. Arthur</h3>

                <span>HTML</span> <span>CSS</span> <span>Git</span>

        </div>
